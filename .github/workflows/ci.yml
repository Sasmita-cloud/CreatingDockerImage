# .github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [ main ]    # triggers on every push to main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Get the code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2 - Setup Java
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3 - Run Tests
      - name: Run Tests
        run: mvn test

      # Step 4 - Build Jar (only if tests pass)
      - name: Build Jar
        run: mvn package -DskipTests

      # Step 5 - Login to DockerHub
      - name: Login to DockerHub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      # Step 6 - Build Docker Image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .

      # Step 7 - Push Image to DockerHub
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}